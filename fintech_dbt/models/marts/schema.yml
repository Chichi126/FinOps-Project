version: 2

models:
  - name: dim_users
    columns:
      - name: user_id
        description: "The unique identifier for each user."
        data_tests:
          - unique
          - not_null
  
  - name: fct_payments
    columns:
      - name: payment_id
        description: "The unique identifier for each payment transaction."
        data_tests:
          - unique
          - not_null

      - name: user_id
        description: "The unique identifier of the user who made the payment."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: amount
        description: "The monetary value of the payment transaction."
        data_tests:
          - not_null

      - name: currency
        description: "Three-letter ISO currency code (e.g., USD, NGN, EUR)."
        data_tests:
          - not_null

      - name: status
        description: "The current state of the payment transaction."
        data_tests:
          - accepted_values:
              values: ['pending', 'completed', 'failed', 'refunded']

      - name: created_at
        description: "The timestamp when the payment was initiated."
        data_tests:
          - not_null

      - name: updated_at
        description: "The timestamp when the payment record was last updated."
    
  - name: fct_ledger
    columns:
      - name: entry_id
        description: "The unique identifier for each ledger entry."
        data_tests:
          - unique
          - not_null

      - name: payment_id
        description: "Foreign key linking back to the core payment transaction."
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_payments')
              field: payment_id

      - name: user_id
        description: "The unique identifier of the user who initiated the transaction."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: entry_type
        description: "Indicates the direction of the funds (e.g., credit or debit)."
        data_tests:
          - accepted_values:
              values: ['credit', 'debit']

      - name: amount
        description: "The monetary value of the transaction. Represented as a Float64."
        data_tests:
          - not_null

      - name: currency
        description: "Three-letter ISO currency code (e.g., USD, NGN, EUR)."
        data_tests:
          - not_null

      - name: posted_at
        description: "The exact timestamp when the ledger entry was finalized."
  - name: dim_merchants
    description: "Dimension table for merchants involved in payment transactions."
    columns:
      - name: merchant_id
        description: "The unique identifier for each merchant."
        data_tests:
          - unique
          - not_null

      - name: partner_since_at
        description: "The timestamp when the merchant first partnered with the platform."
        data_tests:
          - not_null