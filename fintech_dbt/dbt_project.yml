name: 'fintech_dbt'
version: '1.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'fintech_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]


clean-targets:
  - "target"
  - "dbt_packages"
vars:
  start_date: "2023-01-01"
  end_date: "2023-12-31"


models:
  fintech_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts